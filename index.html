<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Silhouette Master Web Pro v10.3</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>

<nav>
    <div class="nav-left">
        <button class="mode-btn active" id="nav-config" onclick="switchMode('config')">⚙ CONFIG</button>
        <button class="mode-btn" id="nav-play" onclick="switchMode('play')">▶ PLAY</button>
    </div>
    <div class="nav-right">
        <label class="mode-btn folder-btn">📁 FOLDER<input type="file" webkitdirectory onchange="handleFolder(this)"></label>
        <button class="mode-btn save-btn" onclick="saveProject()">💾 SAVE JSON</button>
        <label class="mode-btn load-btn">📂 LOAD JSON<input type="file" accept=".json" onchange="loadProject(this)"></label>
    </div>
</nav>

<div id="config-mode" class="page">
    <div class="control-panel">
        <div class="speed-group">
            <span class="panel-label">速度設定(s):</span>
            <label>1:<input type="number" id="speed1" value="2" class="speed-input"></label>
            <label>2:<input type="number" id="speed2" value="5" class="speed-input"></label>
            <label>3:<input type="number" id="speed3" value="10" class="speed-input"></label>
        </div>
        <div class="bulk-group">
            <button class="small-btn" onclick="bulkColor(true)">すべてカラー</button>
            <button class="small-btn" onclick="bulkColor(false)">すべてシルエット</button>
        </div>
    </div>
    <div id="grid" class="grid-container"></div>
</div>

<div id="play-mode" class="page" style="display: none;">
    <div class="stage">
        <div class="play-info" id="play-info">QUESTION 1 / -</div>
        <div class="canvas-box">
            <img id="quiz-img" src="" alt="Quiz Image">
        </div>
        <div class="play-controls">
            <button class="btn-play btn-speed" onclick="startAnim(1)">爆速 (1)</button>
            <button class="btn-play btn-speed" onclick="startAnim(2)">中速 (2)</button>
            <button class="btn-play btn-speed" onclick="startAnim(3)">低速 (3)</button>
            <button class="btn-play btn-reveal" onclick="reveal()">★正解 (Space)</button>
        </div>
        <div class="fs-hint">[F] Fullscreen | [Arrows] Navigate | [ESC] Config</div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
